version: "2"
linters:
  default: all
  disable:
    - wsl
    - wrapcheck
    - revive
  settings:
    depguard:
      rules:
        main:
          allow:
            - $gostd
            - github.com
            - golang.org
            - google.golang.org
    lll:
      line-length: 140
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - Standard
        - Default
        - Prefix(github.com/gripmock)
